name: iOS final sync (Mac compile)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "client/**"
      - "base/**"
      - "scripts/**"
      - "tools/**"
      - ".github/workflows/ios-final-sync.yml"

permissions:
  contents: read

jobs:
  build-ios-final:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pyq64 (Mac luajit -bg)
        run: bash scripts/build_ios_final.sh

      - name: Upload pyq64.zip
        uses: actions/upload-artifact@v4
        with:
          name: pyq64-ios-final
          path: |
            dist/pyq64.zip
            dist/app.scenes.LoginScene
            dist/app.module.lobby.view.createRoom.HFCreateRoomLayer
            dist/app.module.lobby.view.createRoom.CreateRoomLayer_Sss
            dist/app.module.lobby.view.layer.LbShopLayer
            reports/build_report.txt
            reports/luajit_version.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "## iOS Mac compile OK" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat reports/build_report.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
