name: iOS 6-tier LbShopLayer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "client/LbShopLayer.lua"
      - "base/pyq64_base.zip"
      - "scripts/**"
      - "tools/**"
      - ".github/workflows/ios-lbshop-6tier.yml"

permissions:
  contents: read

jobs:
  build-ios-shop:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build 6-tier pyq64 (single pipeline)
        run: bash scripts/build_all.sh

      - name: Upload pyq64.zip
        uses: actions/upload-artifact@v4
        with:
          name: pyq64-ios-6tier
          path: |
            dist/pyq64.zip
            dist/app.module.lobby.view.layer.LbShopLayer
            reports/build_report.txt
            reports/header_before_fix.txt
            reports/header_after_fix.txt
          retention-days: 30

      - name: Summary
        run: |
          echo "## iOS 6-tier build OK" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat reports/build_report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
